# 研究 claim 台账。每个 claim 是这个项目「主张什么」的可追溯单元。
# 一进 repo，agent 应从这里知道当前主张、支持它的 evidence、是否已被验证。
# 证据分层：log < metric < table < figure < paper claim。见 .agent/principles.md。
#
# status: proposed | partial | supported | refuted | retired
# evidence: 指向 evidence.yaml 的 evidence id 列表（可为空表示尚无证据）
# verified_by_fresh_reviewer: paper-grade claim 必须为 true
#
# 迁移说明：以下 4 条 claim 迁移自 ELF-template-case（v1 .harness 模板）的
# memory/boards/claims.yaml。原 schema 把它们标为 status=supported / certainty=evidence-backed，
# 但支撑证据全部只是 clone/py_compile/依赖导入/一次 CPU 前向 smoke —— 按新模板的证据分层
# （lab/research/ANATOMY.md）这只够 grade=log，不够 status=supported（需要 >= metric）。
# 因此这里如实降级为 status=partial，这本身就是一条测试发现：新模板的
# validate-governance.py 证据链检查比旧 boards.yaml 的自由文本 certainty 字段更严格。

claims:
  - id: claim-elf-source-identity
    title: "案例源身份：case source 是公开 lillian039/ELF 仓库，README 显示 main 分支为 ELF 论文的 JAX/TPU 实现"
    status: partial
    hypothesis: "本地与远端记录的 clone/commit 与公开 lillian039/ELF 仓库一致"
    scope: "仅源身份与 README 表述；不是模型执行或复现 claim"
    evidence: [ev-elf-readme-local]
    depends_on: []
    deliverable_refs: []
    verified_by_fresh_reviewer: false
    owner: "codex（旧周期）→ 迁移: claude"
    updated: "2026-07-08"

  - id: claim-elf-remote-smoke
    title: "EPFL PVC 路径能 clone ELF 并对核心源文件跑非破坏性 Python 语法 smoke（不启动 GPU 训练）"
    status: partial
    hypothesis: "remote-bash 在 EPFL PVC 路径下的 clone + py_compile 可重复"
    scope: "仅远端 clone/read 与语法 smoke；不含依赖导入、数据集加载、checkpoint 执行、GPU 训练、指标"
    evidence: [ev-elf-remote-smoke]
    depends_on: []
    deliverable_refs: []
    verified_by_fresh_reviewer: false
    owner: "codex（旧周期）→ 迁移: claude"
    updated: "2026-07-08"

  - id: claim-elf-pytorch-smoke
    title: "ELF 案例已在 pytorch_elf 分支本地与 EPFL 复现，通过非破坏性语法/YAML/launch 脚本 shell 检查"
    status: partial
    hypothesis: "本地与远端 clone 切到同一 pytorch_elf commit 后，语法/配置/脚本检查一致通过"
    scope: "仅 pytorch_elf 的源码/配置/launch 检查；不含运行时依赖导入与模型执行（另有单独证据）"
    evidence: [ev-elf-pytorch-smoke]
    depends_on: [claim-elf-source-identity]
    deliverable_refs: []
    verified_by_fresh_reviewer: false
    owner: "codex（旧周期）→ 迁移: claude"
    updated: "2026-07-08"

  - id: claim-elf-pytorch-runtime-smoke
    title: "EPFL 持久化 PyTorch 环境能导入 pytorch_elf 运行时依赖与 ELF 模块，加载训练 config，并跑通一次 tiny 合成 CPU 前向"
    status: partial
    hypothesis: "在 .venv-pytorch 持久环境下，依赖导入、config 加载与一次 tiny CPU 前向可重复出预期 tensor 形状"
    scope: "仅 EPFL 持久环境的 CPU 运行时 smoke；不含数据集加载、checkpoint 推理、GPU 训练、生成、指标或 paper 级 claim"
    evidence: [ev-elf-pytorch-runtime-smoke]
    depends_on: [claim-elf-pytorch-smoke]
    deliverable_refs: []
    verified_by_fresh_reviewer: false
    owner: "codex（旧周期）→ 迁移: claude"
    updated: "2026-07-08"
