    commit: "b29d8833609e9ab7f67cd9da39435ac5cea04837"
    config: "lab/code/external/ELF/src/configs/training_configs/train_owt_ELF-B.yml（旧周期路径，本仓库未 vendor 该 clone）"
    data_split: null
    baseline: null
    launch_ref: "lab/infra/launch/submit/slurm/README.md"
    tracker: null
    expected_runtime: "<10 分钟"
    success_metric: "9 个源文件语法 smoke + 7 个 YAML 解析 + launch.sh shell 语法全部通过"
    failure_signals: [OOM, NaN, metric-stall, missing-checkpoint, data-mismatch]
    run_summary: "lab/docs/audits/elf-template-case-report.md"
    promote: no
    updated: "2026-07-08"

  - id: run-elf-pytorch-runtime-smoke
    question: "持久化 uv 环境能否导入 PyTorch 版 ELF 运行时依赖并跑通一次 CPU 前向？"
