# 实验台账。每个 run 一条。experiment card 落地为这里的一行 + lab/code/experiments/<id>.md。
# run bytes（logs/checkpoints/outputs）不进 Git，只留 index/summary（见 lab/runs/、lab/artifacts/）。
#
# status: planned | running | done | failed | superseded
# promote: no | unclear | yes  （是否应升级为 evidence/paper claim；yes 走 human gate）
#
# 迁移说明：迁移自 ELF-template-case 的 memory/boards/experiments.yaml。三条 run 均为
# 旧周期在另一台机器（EPFL 集群 + Mac）上完成的 smoke，本仓库无法复核，promote=no。

experiments:
