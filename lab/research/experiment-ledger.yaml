    status: done
    commit: "5098bf28b5e9b52c329970a7e4e1cc28251c76e6"
    config: null
    data_split: null
    baseline: null
    launch_ref: "lab/infra/paths/remote-projects.yaml（旧周期 EPFL 路径记录）"
    tracker: null
    expected_runtime: "<5 分钟（clone + py_compile）"
    success_metric: "py_compile 对 6 个核心文件全部 exit 0"
    failure_signals: [OOM, NaN, metric-stall, missing-checkpoint, data-mismatch]
    run_summary: "lab/docs/audits/elf-template-case-report.md"
    promote: no
    updated: "2026-07-08"

  - id: run-elf-pytorch-smoke
