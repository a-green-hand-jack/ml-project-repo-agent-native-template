- run 进入/离开 running、或出现 stale alert 时，同步 `memory/current-status.md` 的活跃实验状态。

## alert 与 resume/recovery
- `experiment-monitor` 的 watcher 输出（结构化 alerts）由你并入 ledger 对应条目的
  `alerts` 字段（不新开文件），并给 human 摆出待批提案（动作 + 确切命令 + 影响半径）。
