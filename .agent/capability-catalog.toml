# ============================ hooks（8）============================
# 正式 hook = 真实被 .claude/settings.json / .codex/config.toml 挂载为 hook command 的脚本
# （校验器 _discover_hooks 以注册表面为 canonical）。helper/setter（context_usage /
# agent_identity / agent_name_set）不是正式 hook capability，故不登记、不豁免——它们不在
# discovered 集合内。hook 两边由各自 config 调用同一脚本，不生成独立 adapter，故 adapters 一律为空。

