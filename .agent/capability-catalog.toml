# capability-catalog.toml — Research 能力面的声明式 canonical 目录
#
# 这是什么：把散落在 DESIGN §10 / doctrine / skills / adapters 里的能力表面收敛成
# 一份**声明式、可机器校验**的 contract。每个正式 capability（agent / skill /
# command / hook）在此登记（或标 exempt），并声明它的契约维度。校验器
# `scripts/check-capability-catalog.py`（并入 validate-governance）强制：
#   - 登记齐全：`.claude/{agents,skills,commands,hooks}` 里每个能力都在此登记或 exempt；
#   - 无幽灵条目：registered 能力必须有对应 canonical 文件；
#   - adapter parity：声明的 adapters 与 sync-codex-adapters.py 的映射一致且文件存在。
#
# canonical 是 `.claude/` 下的实现文件；本目录是它们的索引与契约声明，不是第二处实现。
# DESIGN §10 的能力清单表退化为本目录的**人读派生摘要**，不再是唯一不可执行清单。
# 见 issue #28（父 tracker #24）。改能力面时同 commit 更新本目录并跑校验器。

schema_version = 1
profile = "research"

# 消费 research-writing-bridge 的 chassis-spec：绑定不可变 commit + v1 spec 文件 blob digest。
# Bridge issue #3/#6 虽仍 OPEN，但 chassis/v1 与 compatibility/matrix 的 repo bytes 已存在，
# 以 commit/bytes 为事实。升级 chassis 走本 pin/compatibility gate（见 check-capability-catalog.py）。
[chassis_spec]
source = "a-green-hand-jack/research-writing-bridge"
spec_issue = 3
version_pins_issue = 6
promotion_lifecycle_issue = 7
status = "pinned"
spec_version = "v1"
pin = "5e02b52e6026a0581b6fa33987ce997f52b547a3"   # Bridge main 不可变 commit
# pinned spec 文件 → git blob digest（gh api contents .sha @ pin，可离线判定的固定 ref）
[chassis_spec.spec_files]
"chassis/v1/spec.md" = "c444645e44411ffb6e87086c8744f5e622e95d56"
"chassis/v1/capability.schema.json" = "a99e120560703f0a0ddf80d25adfb12709a7c0b2"
"compatibility/matrix.json" = "7bc86077ebf61cef826c098028d6821351d57101"
# 本地按 compatibility/matrix.json 的 supported 条目消费 chassis 1.0.0（major 必须在本地支持范围）。
[chassis_spec.compatibility]
chassis = "1.0.0"
protocol = "1.0.0"
status = "supported"

