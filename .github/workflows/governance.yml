name: governance

# 防漂移门禁跑在 CI 上。validator 无第三方硬依赖，PyYAML 为可选深检。
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install optional YAML deep-check dep
        run: pip install pyyaml
      - name: Validate governance (strict)
        run: python scripts/validate-governance.py --strict
